name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests examples benchmarks

      - name: Ruff format
        run: ruff format --check src tests examples benchmarks

      - name: Mypy
        run: mypy src

      - name: Pytest with coverage
        run: pytest --cov=ontolog --cov-report=xml --cov-report=term

      - name: Run example scripts
        if: matrix.python-version == '3.12'
        run: |
          python examples/controlboard.py
          bash examples/basic_cli.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: matrix.python-version == '3.12'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build

      - name: Check package
        run: twine check dist/*

      - name: Test install from wheel
        run: |
          pip install dist/*.whl
          ontolog --version
          python -c "import ontolog; print(ontolog.__version__)"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Sphinx build
        run: sphinx-build -W -b html docs docs/_build
